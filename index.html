<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>El consultorio de Olga</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fredoka:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <h1 class="site-title">EL CONSULTORIO DE OLGA</h1>
  </header>

  <main class="main-grid">

    <section class="phrase-stage">

      <div class="comic-bubble">
        <div id="phraseCard" aria-live="polite">
          <!-- JS inyecta spans aquí -->
        </div>
      </div>

      <div class="olga-section">
        <img src="imagenes/olga.png" alt="Olga la mascota" class="mascot-img" />
      </div>

      <div class="action-buttons">
        <button id="btnNuevaFrase" class="btn btn-primary" title="Nueva frase aleatoria">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
          </svg>
        </button>
        <button id="btnAnadirFrase" class="btn btn-secondary" title="Añadir frase">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>

    </section>

  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-box">
      <h2 id="modalTitle" class="modal-title">AÑADE TU FRASE</h2>
      <textarea
        id="nuevaFraseInput"
        class="modal-textarea"
        placeholder="Escribe una nueva pregunta..."
        maxlength="200"
        rows="4"
      ></textarea>
      <div class="modal-actions">
        <button id="btnGuardarFrase" class="btn btn-primary btn-text">Guardar</button>
        <button id="btnCerrarModal" class="btn btn-ghost btn-text">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
